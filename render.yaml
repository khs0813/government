services:
  - type: web
    name: government-benefit-calculator
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: ./out
    domains:
      - jiwoncalc.co.kr
    renderSubdomainPolicy: disabled
    headers:
      - path: /*
        name: Strict-Transport-Security
        value: max-age=31536000; includeSubDomains
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: Permissions-Policy
        value: camera=(), microphone=(), geolocation=(), payment=(), usb=()
      - path: /*
        name: Content-Security-Policy-Report-Only
        value: default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; img-src 'self' data: https:; font-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' https:; connect-src 'self' https:; frame-src https:; upgrade-insecure-requests
      - path: /opengraph-image
        name: Content-Type
        value: image/png
      - path: /opengraph-image
        name: Cache-Control
        value: public, max-age=86400
      - path: /robots.txt
        name: Content-Type
        value: text/plain; charset=utf-8
      - path: /sitemap.xml
        name: Content-Type
        value: application/xml; charset=utf-8
    routes:
      - type: redirect
        source: /calculators
        destination: /calculators/
      - type: redirect
        source: /calculators/:slug
        destination: /calculators/:slug/
      - type: redirect
        source: /benefits
        destination: /benefits/
      - type: redirect
        source: /benefits/:slug
        destination: /benefits/:slug/
      - type: redirect
        source: /guides
        destination: /guides/
      - type: redirect
        source: /guides/:slug
        destination: /guides/:slug/
      - type: redirect
        source: /about
        destination: /about/
      - type: redirect
        source: /methodology
        destination: /methodology/
      - type: redirect
        source: /editorial-policy
        destination: /editorial-policy/
      - type: redirect
        source: /privacy
        destination: /privacy/
      - type: redirect
        source: /disclaimer
        destination: /disclaimer/
      - type: redirect
        source: /contact
        destination: /contact/
