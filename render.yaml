services:
  - type: web
    name: government-benefit-calculator
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: ./out
    domains:
      - jiwoncalc.co.kr
    headers:
      - path: /*
        name: Strict-Transport-Security
        value: max-age=31536000; includeSubDomains
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: Permissions-Policy
        value: camera=(), microphone=(), geolocation=(), payment=(), usb=()
      - path: /*
        name: Content-Security-Policy-Report-Only
        value: default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; img-src 'self' data: https:; font-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' https:; connect-src 'self' https:; frame-src https:; upgrade-insecure-requests
      - path: /opengraph-image
        name: Content-Type
        value: image/png
      - path: /opengraph-image
        name: Cache-Control
        value: public, max-age=86400
